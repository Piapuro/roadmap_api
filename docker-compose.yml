version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - go_cache:/root/go/pkg/mod
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: roadmap_dev
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d roadmap_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app-network

  migrate:
    image: migrate/migrate
    volumes:
      - ./sql/migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://dev_user:dev_password@db:5432/roadmap_dev?sslmode=disable
      up
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  go_cache:

networks:
  app-network:
    driver: bridge
