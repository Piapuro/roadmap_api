      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.RoadmapResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ロードマップ取得
      tags:
      - roadmaps
    put:
      consumes:
      - application/json
      description: 指定IDのロードマップを更新します
      parameters:
      - description: ロードマップID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: 更新情報
        in: body
